<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E5A3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stableford Caddy</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --green:#1E5A3C; --green-dark:#143D29; --green-light:#E8F1EB;
  --ink:#14201A; --ink-2:#4A5A50; --ink-3:#7A8A80;
  --paper:#FAFAF6; --card:#FFFFFF; --line:#DDE3DE;
  --red:#B3261E; --red-bg:#FBEAE8; --amber:#8A5A00; --amber-bg:#FBF1DC;
  --ok:#1E5A3C; --ok-bg:#E8F1EB;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  min-height:100vh; -webkit-font-smoothing:antialiased;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
}
#app{max-width:480px; margin:0 auto; padding:14px 14px 10px}
h1{font-size:1.3rem; font-weight:700; margin:.2rem 0 1rem; letter-spacing:-.01em}
h2{font-size:1.05rem; font-weight:700; margin:1.2rem 0 .6rem}
p{line-height:1.55}
button{
  font:inherit; cursor:pointer; border:1px solid var(--line); background:var(--card);
  color:var(--ink); border-radius:var(--r); padding:12px 14px; font-weight:600;
  touch-action:manipulation;
}
button:active{transform:scale(.975)}
input,select{
  font:inherit; border:1px solid var(--line); border-radius:10px; background:var(--card);
  color:var(--ink); padding:11px 12px; width:100%;
}
input:focus,select:focus{outline:2px solid var(--green); outline-offset:1px; border-color:var(--green)}
label{display:block; font-size:.85rem; font-weight:600; color:var(--ink-2); margin:.9rem 0 .3rem}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; margin-bottom:12px}
.muted{color:var(--ink-3); font-size:.85rem}
.small{font-size:.85rem}
.row{display:flex; gap:8px; align-items:center}
.grow{flex:1}
.btn-primary{background:var(--green); border-color:var(--green); color:#fff}
.btn-primary:active{background:var(--green-dark)}
.btn-danger-soft{background:var(--red-bg); border-color:#E8C4C1; color:var(--red)}
.btn-ghost{background:transparent; border-color:transparent; color:var(--ink-2); font-weight:600}
.btn-block{display:block; width:100%}
.badge{display:inline-block; font-size:.72rem; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap}
.b-p1,.b-p2{background:var(--red-bg); color:var(--red)}
.b-free{background:var(--ok-bg); color:var(--ok)}
.b-dep{background:var(--amber-bg); color:var(--amber)}
.b-info{background:#E9EDF6; color:#2C4A80}

/* ---- Play screen ---- */
.hole-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px}
.hole-head .num{font-size:1.5rem; font-weight:800; letter-spacing:-.02em}
.hole-head .sub{color:var(--ink-2); font-size:.85rem; margin-top:2px}
.hole-head .pts{text-align:right}
.hole-head .pts b{font-size:1.25rem; color:var(--green)}
.counter{
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  background:var(--green-light); border-radius:var(--r); padding:12px 16px; margin-bottom:14px;
}
.counter .n{font-size:2.3rem; font-weight:800; line-height:1}
.counter .pen{color:var(--red); font-size:.85rem; font-weight:700}
.counter .until{text-align:right; font-size:.82rem; color:var(--ink-2); max-width:46%}
.counter .until b{display:block; font-size:1rem; color:var(--ink)}
.counter .until.warn b{color:var(--red)}
.ballwrap{display:flex; justify-content:center; margin:6px 0 16px}
.ball{
  width:min(58vw,230px); height:min(58vw,230px); border-radius:50%;
  background:radial-gradient(circle at 32% 28%, #FFFFFF 0%, #F2F3EF 55%, #DDE1DA 100%);
  border:1px solid #C9CFC8;
  box-shadow:0 6px 18px rgba(20,32,26,.18), inset 0 -8px 16px rgba(20,32,26,.06);
  color:var(--green-dark); font-size:1.5rem; font-weight:800; letter-spacing:.06em;
  display:flex; align-items:center; justify-content:center; position:relative;
}
.ball::after{
  content:""; position:absolute; inset:0; border-radius:50%;
  background-image:radial-gradient(rgba(20,32,26,.07) 1.5px, transparent 1.6px);
  background-size:14px 14px; background-position:3px 5px;
}
.pen-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px}
.pen-btn{min-height:58px; font-size:.95rem; position:relative; padding-right:34px}
.pen-btn.top{background:var(--red-bg); border-color:#E8C4C1; color:var(--red); min-height:64px; font-size:1rem}
.pen-btn small{display:block; font-weight:700; font-size:.72rem; opacity:.75}
.pen-btn .info{
  position:absolute; top:6px; right:6px; width:24px; height:24px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:.72rem; font-weight:800; color:inherit; opacity:.55; border:1.5px solid currentColor;
}
.util-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0}
.done-btn{min-height:60px; font-size:1.05rem}
details.more{margin:4px 0 8px}
details.more summary{
  list-style:none; text-align:center; color:var(--ink-2); font-size:.85rem; font-weight:600;
  padding:8px; cursor:pointer; border-radius:10px;
}
details.more summary::-webkit-details-marker{display:none}
details.more[open] summary{color:var(--green)}

/* ---- Tables ---- */
table{width:100%; border-collapse:collapse; font-size:.86rem}
th,td{padding:7px 4px; text-align:center; border-bottom:1px solid var(--line)}
th{font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-3); font-weight:700}
td:first-child,th:first-child{text-align:left}
tr.sum td{font-weight:800; background:var(--green-light)}
td.pts-cell{font-weight:800; color:var(--green)}

/* ---- Rules ---- */
.chips{display:flex; gap:6px; margin:10px 0}
.chip{font-size:.8rem; padding:6px 13px; border-radius:999px; border:1px solid var(--line); background:var(--card); font-weight:600}
.chip.on{background:var(--green); color:#fff; border-color:var(--green)}
details.rule{background:var(--card); border:1px solid var(--line); border-radius:var(--r); margin-bottom:8px}
details.rule summary{
  list-style:none; display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:13px 14px; cursor:pointer; font-weight:700; font-size:.95rem;
}
details.rule summary::-webkit-details-marker{display:none}
details.rule .body{padding:0 14px 13px; font-size:.9rem; line-height:1.6; color:var(--ink-2); white-space:pre-line}

/* ---- Courses / hole editor ---- */
.hole-row{display:grid; grid-template-columns:38px 1fr 1fr; gap:8px; align-items:center; margin-bottom:6px}
.hole-row .hn{font-weight:800; color:var(--ink-2); text-align:center}
.course-item{display:flex; justify-content:space-between; align-items:center; padding:12px 2px; border-bottom:1px solid var(--line)}
.lang-row{display:flex; gap:8px}
.lang-row button{flex:1}
.lang-row button.on{background:var(--green); color:#fff; border-color:var(--green)}

/* ---- Nav ---- */
nav{
  position:fixed; bottom:0; left:0; right:0; background:var(--card);
  border-top:1px solid var(--line); display:flex; z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1; border:none; border-radius:0; background:none; padding:9px 0 7px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  font-size:.68rem; font-weight:700; color:var(--ink-3);
}
nav button.on{color:var(--green)}
nav button:active{transform:none}
nav svg{width:23px; height:23px}

/* ---- Modal ---- */
#modal-bg{
  position:fixed; inset:0; background:rgba(10,20,14,.5); z-index:100;
  display:none; align-items:flex-end; justify-content:center;
}
#modal-bg.show{display:flex}
#modal{
  background:var(--card); border-radius:20px 20px 0 0; width:100%; max-width:480px;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .18s ease-out;
  max-height:88vh; max-height:88dvh; overflow-y:auto; -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
body.modal-open{overflow:hidden; touch-action:none}
body.modal-open #modal{touch-action:pan-y}
@keyframes up{from{transform:translateY(30px); opacity:.5} to{transform:translateY(0); opacity:1}}
#modal h3{margin:0 0 10px; font-size:1.1rem}
.confirm-big{font-size:1.6rem; font-weight:800; text-align:center; margin:14px 0}
.confirm-big .arrow{color:var(--ink-3); font-weight:400; margin:0 8px}
.confirm-big .p{color:var(--green)}
@media (prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important} }
</style>
</head>

<div id="app"></div>
<nav id="nav"></nav>
<div id="modal-bg"><div id="modal"></div></div>

const LS = "golf-stableford-v1";
let S = load();
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS));
    if(d && d.courses) return d;
  }catch(e){}
  const nav2 = (navigator.language||"en").slice(0,2).toLowerCase();
  return { lang: T[nav2] ? nav2 : "en", courses:[], rounds:[], active:null, lastHcp:18, tab:"play" };
}
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }
function t(k){ return (T[S.lang]||T.en)[k] ?? k; }
function tf(k, vals){ let s=t(k); for(const kk in vals) s=s.replace("{"+kk+"}", vals[kk]); return s; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* ================= STABLEFORD ================= */
function recvMap(holes, hcp){
  const idx = holes.map((h,i)=>({i, si:h.si||i+1}));
  idx.sort((a,b)=>a.si-b.si);
  const n = holes.length, base = Math.floor(Math.max(0,hcp)/n), extra = Math.max(0,hcp)%n;
  const m = new Array(n).fill(base);
  idx.forEach((o,rank)=>{ if(rank<extra) m[o.i]+=1; });
  return m;
}
function holePoints(par, recv, gross, pickedUp){
  if(pickedUp) return 0;
  return Math.max(0, 2 + par + recv - gross);
}

  nav.innerHTML = ["play","card","rules","courses"].map(id=>

  ).join("");
}
function go(tab){ S.tab=tab; save(); render(); window.scrollTo(0,0); }
function render(){
  renderNav();
  if(S.tab==="play") renderPlay();
  else if(S.tab==="card") renderCard();
  else if(S.tab==="rules") renderRules();
  else renderCourses();

/* ================= PLAY ================= */
function renderPlay(){
  const a = S.active;
  if(!a){ renderStart(); return; }
  if(a.cur >= a.holes.length){ renderFinished(); return; }
  const h = a.holes[a.cur];
  const strokes = h.s + h.p;
  const maxGross = h.par + h.recv + 1;
  const recvTxt = h.recv===0 ? t("strokeRecvNone") : (h.recv===1 ? t("strokeRecvOne") : tf("strokeRecvMany",{n:h.recv}));
  const donePts = a.holes.filter(x=>x.done).reduce((s,x)=>s+x.pts,0);
  const noPts = strokes >= maxGross;
  const untilHtml = noPts
    ? `<div class="until warn"><b>${esc(t("noPtsLeft"))}</b>${esc(t("pickupHint"))}</div>`
    : `<div class="until">${esc(t("ptsUntil"))}<b>${maxGross} ${esc(t("strokesWord"))}</b></div>`;
  const penTxt = h.p===0 ? "" : `<span class="pen">${esc(h.p===1?t("penOne"):tf("penMany",{n:h.p}))}</span>`;
  const penBtn = d => `<button class="pen-btn ${d.top?"top":""}" onclick="addPen('${d.id}',${d.n})">${esc(t(d.k))}<small>+${d.n}</small>${d.rule?`<span class="info" onclick="event.stopPropagation();openRule('${d.rule}')" role="button" aria-label="Info">i</span>`:""}</button>`;
  app.innerHTML = `
    <div class="hole-head">
      <div><div class="num">${esc(t("hole"))} ${h.no}<span class="muted" style="font-weight:600;font-size:1rem"> / ${a.holes[a.holes.length-1].no}</span></div>
      <div class="sub">${esc(t("par"))} ${h.par} · ${esc(t("si"))} ${h.si} · ${esc(recvTxt)}</div></div>
      <div class="pts"><div class="muted">${esc(t("roundPts"))}</div><b>${donePts} ${esc(t("ptsShort"))}</b></div>
    </div>
    <div class="counter">
      <div><div class="muted small">${esc(t("strokesThisHole"))}</div><span class="n">${strokes}</span> ${penTxt}</div>
      ${untilHtml}
    </div>
    <div class="ballwrap"><button class="ball" onclick="addStroke()" aria-label="${esc(t("stroke"))}">${esc(t("stroke"))}</button></div>
    <div class="pen-grid">${PEN_TOP.map(d=>penBtn({...d,top:true})).join("")}${PEN_MID.map(d=>penBtn(d)).join("")}</div>
    <details class="more"><summary>${esc(t("more"))} ▾</summary>
      <div class="pen-grid">${PEN_MORE.map(d=>penBtn(d)).join("")}</div>
    </details>
    <div class="util-grid">
      <button onclick="undo()">↩ ${esc(t("undo"))}</button>
      <button onclick="askPickup()">✕ ${esc(t("pickup"))}</button>
    </div>
    <button class="btn-primary btn-block done-btn" onclick="askDone()">✓ ${esc(t("holeDone"))}</button>
    <div style="text-align:center;margin-top:14px"><button class="btn-ghost small" onclick="askCancelRound()">${esc(t("cancelRound"))}</button></div>`;
}
function addStroke(){ const h=cur(); h.s++; h.log.push("s"); buzz(15); save(); renderPlay(); }
function addPen(id,n){ const h=cur(); h.p+=n; h.log.push("p"+n); buzz([20,40,20]); save(); renderPlay(); }
function cur(){ return S.active.holes[S.active.cur]; }
function undo(){
  const h=cur(); const last=h.log.pop();
  if(last==="s") h.s=Math.max(0,h.s-1);
  else if(last==="p1") h.p=Math.max(0,h.p-1);
  else if(last==="p2") h.p=Math.max(0,h.p-2);
  buzz(10); save(); renderPlay();
}
function askPickup(){
  modal(`<h3>${esc(t("pickupTitle"))}</h3><p class="muted">${esc(t("pickupMsg"))}</p>
    <div class="util-grid"><button onclick="closeModal()">${esc(t("back"))}</button>
    <button class="btn-danger-soft" onclick="doPickup()">${esc(t("confirm"))}</button></div>`);
}
function doPickup(){ finishHole(true); closeModal(); }
function askDone(){
  const h=cur(); const gross=h.s+h.p;
  if(h.s===0){ modal(`<p>${esc(t("needStroke"))}</p><button class="btn-block" onclick="closeModal()">${esc(t("back"))}</button>`); return; }
  const pts = holePoints(h.par,h.recv,gross,false);
  const sTxt = gross===1?t("strokesOne"):tf("strokesN",{n:gross});
  const pTxt = h.p===0?"":`<div class="muted" style="text-align:center">${esc(h.p===1?t("ofWhichPenOne"):tf("ofWhichPen",{n:h.p}))}</div>`;
  const ptTxt = pts===1?t("ptsOne"):tf("ptsN",{n:pts});
  modal(`<h3>${esc(tf("confirmHole",{h:h.no}))}</h3>
    <div class="confirm-big">${esc(sTxt)}<span class="arrow">→</span><span class="p">${esc(ptTxt)}</span></div>${pTxt}
    <div class="util-grid" style="margin-top:16px"><button onclick="closeModal()">${esc(t("back"))}</button>
    <button class="btn-primary" onclick="doDone()">${esc(t("confirm"))}</button></div>`);
}
function doDone(){ finishHole(false); closeModal(); }
function finishHole(pickedUp){
  const h=cur(); const gross=h.s+h.p;
  h.done=true; h.pickedUp=pickedUp;
  h.pts = holePoints(h.par,h.recv,gross,pickedUp);
  S.active.cur++;
  if(S.active.cur >= S.active.holes.length){
    const a=S.active;
    S.rounds.unshift({ id:uid(), date:new Date().toISOString().slice(0,10), courseName:a.courseName,
      hcp:a.hcp, seg:a.seg, holes:a.holes.map(x=>({no:x.no,par:x.par,si:x.si,recv:x.recv,s:x.s,p:x.p,pts:x.pts,pickedUp:!!x.pickedUp})) });
  }
  buzz(30); save(); renderPlay();
}
function renderFinished(){
  const a=S.active; const tot=a.holes.reduce((s,x)=>s+x.pts,0);
  app.innerHTML = `<div style="text-align:center;padding:40px 0">
    <div style="font-size:3rem">⛳</div>
    <h1 style="margin:.4rem 0">${esc(t("roundDone"))}</h1>
    <p class="muted">${esc(a.courseName)} · ${esc(t("hcpLabel"))} ${a.hcp}</p>
    <div style="font-size:3.2rem;font-weight:800;color:var(--green);margin:10px 0">${tot}</div>
    <p class="muted" style="margin-top:0">${esc(t("totalPts"))}</p>
    <button class="btn-block" style="margin-top:18px" onclick="go('card')">${esc(t("viewCard"))}</button>
    <button class="btn-primary btn-block" style="margin-top:10px" onclick="endActive()">${esc(t("newRound"))}</button>
  </div>`;
}
function endActive(){ S.active=null; save(); render(); }
function askCancelRound(){
  modal(`<p>${esc(t("cancelConfirm"))}</p><div class="util-grid">
    <button onclick="closeModal()">${esc(t("back"))}</button>
    <button class="btn-danger-soft" onclick="S.active=null;save();closeModal();render()">${esc(t("confirm"))}</button></div>`);
}
/* --- start screen --- */
function renderStart(){
  if(S.courses.length===0){
    app.innerHTML = `<h1>${esc(t("startRound"))}</h1><div class="card"><p>${esc(t("noCourses"))}</p>
      <button class="btn-primary btn-block" onclick="go('courses')">${esc(t("createCourseFirst"))}</button></div>
      <p class="muted">${esc(t("installHint"))}</p>`;
    return;
  }
  const opts = S.courses.map(c=>`<option value="${c.id}">${esc(c.name)} (${c.holes.length} ${esc(t("holesLabel"))})</option>`).join("");
  app.innerHTML = `<h1>${esc(t("startRound"))}</h1><div class="card">
    <label>${esc(t("course"))}</label><select id="st-course" onchange="startSeg()">${opts}</select>
    <div id="st-seg"></div>
    <label>${esc(t("courseHcp"))}</label>
    <input id="st-hcp" type="number" inputmode="numeric" min="0" max="54" value="${S.lastHcp}">
    <p class="muted">${esc(t("hcpHint"))}</p>
    <button class="btn-primary btn-block done-btn" style="margin-top:8px" onclick="startRound()">${esc(t("begin"))}</button>
  </div><p class="muted">${esc(t("installHint"))}</p>`;
  startSeg();
}
function startSeg(){
  const c = S.courses.find(x=>x.id===document.getElementById("st-course").value);
  const el = document.getElementById("st-seg");
  el.innerHTML = (c && c.holes.length===18) ? `<label>${esc(t("holesToPlay"))}</label>
    <select id="st-which"><option value="all">${esc(t("all18"))}</option>
    <option value="f9">${esc(t("front9"))}</option><option value="b9">${esc(t("back9"))}</option></select>` : "";
}
function startRound(){
  const c = S.courses.find(x=>x.id===document.getElementById("st-course").value);
  if(!c) return;
  const hcp = Math.max(0, Math.min(54, parseInt(document.getElementById("st-hcp").value||"0",10)||0));
  S.lastHcp = hcp;
  const whichEl = document.getElementById("st-which");
  const seg = whichEl ? whichEl.value : "all";
  let hs = c.holes.map((h,i)=>({no:i+1, par:h.par, si:h.si}));
  if(seg==="f9") hs = hs.slice(0,9); else if(seg==="b9") hs = hs.slice(9);
  const rm = recvMap(hs, hcp);
  S.active = { courseName:c.name, hcp, seg, cur:0,
    holes: hs.map((h,i)=>({...h, recv:rm[i], s:0, p:0, pts:0, done:false, log:[]})) };
  save(); render();
}
/* ================= SCORECARD ================= */
function roundTable(holes, seg){
  const row = h => `<tr><td>${h.no}</td><td>${h.par}</td><td>${h.si}</td>
    <td>${h.pickedUp ? "–" : h.s+h.p}${h.pickedUp?` <span class="muted small">(${esc(t("pickedUp"))})</span>`:""}</td>
    <td>${h.p||""}</td><td class="pts-cell">${h.pts}</td></tr>`;
  const sum = (arr,label) => `<tr class="sum"><td colspan="3">${esc(label)}</td>
    <td>${arr.filter(h=>!h.pickedUp).reduce((s,h)=>s+h.s+h.p,0)}</td>
    <td>${arr.reduce((s,h)=>s+h.p,0)||""}</td><td>${arr.reduce((s,h)=>s+h.pts,0)}</td></tr>`;
  let body="";
  if(holes.length===18){
    body = holes.slice(0,9).map(row).join("") + sum(holes.slice(0,9), t("out"))
         + holes.slice(9).map(row).join("") + sum(holes.slice(9), t("inn"))
         + sum(holes, t("total"));
  } else {
    body = holes.map(row).join("") + sum(holes, t("total"));
  }
  return `<table><thead><tr><th>${esc(t("hole"))}</th><th>${esc(t("par"))}</th><th>${esc(t("si"))}</th>
    <th>${esc(t("colStrokes"))}</th><th>${esc(t("colPen"))}</th><th>${esc(t("colPts"))}</th></tr></thead><tbody>${body}</tbody></table>`;
}
function renderCard(){
  let html = `<h1>${esc(t("tabCard"))}</h1>`;
  if(S.active){
    const done = S.active.holes.filter(h=>h.done);
    html += `<h2>${esc(t("currentRound"))} · ${esc(S.active.courseName)} · ${esc(t("hcpLabel"))} ${S.active.hcp}</h2>
      <div class="card" style="padding:8px 10px">${done.length ? roundTable(done, S.active.seg) : `<p class="muted" style="margin:8px">–</p>`}</div>`;
  }
  html += `<h2>${esc(t("history"))}</h2>`;
  if(S.rounds.length===0) html += `<p class="muted">${esc(t("noRounds"))}</p>`;
  else html += S.rounds.map(r=>{
    const tot = r.holes.reduce((s,h)=>s+h.pts,0);
    return `<details class="rule"><summary><span>${esc(r.date)} · ${esc(r.courseName)}<br>
      <span class="muted small" style="font-weight:400">${esc(t("hcpLabel"))} ${r.hcp} · ${r.holes.length} ${esc(t("holesLabel"))}</span></span>
      <span class="badge b-free" style="font-size:.9rem">${tot} ${esc(t("ptsShort"))}</span></summary>
      <div class="body" style="white-space:normal">${roundTable(r.holes, r.seg)}
      <button class="btn-danger-soft btn-block small" style="margin-top:10px" onclick="askDelRound('${r.id}')">${esc(t("deleteRound"))}</button></div></details>`;
  }).join("");
  app.innerHTML = html;
}
function askDelRound(id){
  modal(`<p>${esc(t("deleteConfirm"))}</p><div class="util-grid">
    <button onclick="closeModal()">${esc(t("back"))}</button>
    <button class="btn-danger-soft" onclick="delRound('${id}')">${esc(t("confirm"))}</button></div>`);
}
function delRound(id){ S.rounds = S.rounds.filter(r=>r.id!==id); save(); closeModal(); renderCard(); }

/* ================= RULES ================= */
let ruleFilter="all", ruleQuery="";
const BADGE = { p1:["b-p1","bP1"], p2:["b-p2","bP2"], free:["b-free","bFree"], dep:["b-dep","bDep"], info:["b-info","bInfo"] };
function renderRules(openId){
  const rules = t("rules");
  const list = rules.filter(r=>{
    if(ruleFilter==="pen" && !(r.b==="p1"||r.b==="p2")) return false;
    if(ruleFilter==="free" && r.b!=="free") return false;
    if(ruleQuery && !(r.t+" "+r.x).toLowerCase().includes(ruleQuery.toLowerCase())) return false;
    return true;
  });
  const chips = [["all","fAll"],["pen","fPen"],["free","fFree"]].map(([id,k])=>
    `<button class="chip ${ruleFilter===id?"on":""}" onclick="ruleFilter='${id}';renderRules()">${esc(t(k))}</button>`).join("");
  app.innerHTML = `<h1>${esc(t("tabRules"))}</h1>
    <input type="search" placeholder="${esc(t("searchPh"))}" value="${esc(ruleQuery)}" oninput="ruleQuery=this.value;renderRulesList()">
    <div class="chips">${chips}</div><div id="rules-list"></div>`;
  renderRulesList(openId);
}
function renderRulesList(openId){
  const rules = t("rules");
  const list = rules.filter(r=>{
    if(ruleFilter==="pen" && !(r.b==="p1"||r.b==="p2")) return false;
    if(ruleFilter==="free" && r.b!=="free") return false;
    if(ruleQuery && !(r.t+" "+r.x).toLowerCase().includes(ruleQuery.toLowerCase())) return false;
    return true;
  });
  document.getElementById("rules-list").innerHTML = list.length===0 ? `<p class="muted">${esc(t("noRuleFound"))}</p>` :
    list.map(r=>{ const [cls,bk]=BADGE[r.b];
      return `<details class="rule" ${r.id===openId?"open":""} id="rule-${r.id}"><summary><span>${esc(r.t)}</span>
        <span class="badge ${cls}">${esc(t(bk))}</span></summary><div class="body">${esc(r.x)}</div></details>`;
    }).join("");
  if(openId){ const el=document.getElementById("rule-"+openId); if(el && el.scrollIntoView) el.scrollIntoView({block:"center"}); }
}
function openRule(id){ ruleFilter="all"; ruleQuery=""; S.tab="rules"; save(); renderNav(); renderRules(id); }

/* ================= COURSES & SETTINGS ================= */
function renderCourses(){
  const items = S.courses.map(c=>`<div class="course-item"><div><b>${esc(c.name)}</b>
      <div class="muted small">${c.holes.length} ${esc(t("holesLabel"))}</div></div>
    <div class="row"><button class="small" onclick="editCourse('${c.id}')">${esc(t("edit"))}</button>
      <button class="small btn-danger-soft" onclick="askDelCourse('${c.id}')">${esc(t("delete"))}</button></div></div>`).join("");
  app.innerHTML = `<h1>${esc(t("tabCourses"))}</h1>
    <h2>${esc(t("myCourses"))}</h2>
    <div class="card">${items || `<p class="muted" style="margin:4px 0">${esc(t("noCourses"))}</p>`}
      <button class="btn-primary btn-block" style="margin-top:10px" onclick="editCourse(null)">＋ ${esc(t("newCourse"))}</button></div>
    <h2>${esc(t("language"))}</h2>
    <div class="card"><div class="lang-row">
      ${["de","en","fr"].map(l=>`<button class="${S.lang===l?"on":""}" onclick="setLang('${l}')">${l.toUpperCase()}</button>`).join("")}
    </div></div>
    <h2>${esc(t("dataTitle"))}</h2>
    <div class="card"><p class="muted" style="margin-top:0">${esc(t("dataHint"))}</p>
      <button class="btn-block" onclick="exportData()">⬇ ${esc(t("exportData"))}</button>
      <button class="btn-block" style="margin-top:8px" onclick="document.getElementById('imp').click()">⬆ ${esc(t("importData"))}</button>
      <input type="file" id="imp" accept=".json,application/json" style="display:none" onchange="importData(this)">
    </div>
    <p class="muted">${esc(t("installHint"))}</p>
    <p class="muted small" style="text-align:center">Stableford Caddy v${APP_VERSION}</p>`;
}
function setLang(l){ S.lang=l; save(); render(); }
function editCourse(id){
  const c = id ? S.courses.find(x=>x.id===id) : null;
  const n = c ? c.holes.length : 18;
  modal(courseForm(c, n));
}
function courseForm(c, n){
  const cid = (c && c.id) ? c.id : "";
  const base = c ? c.holes : [];
  const holes = Array.from({length:n},(_,i)=> base[i] ? base[i] : {par:4, si:i+1});
  const rows = holes.map((h,i)=>`<div class="hole-row"><div class="hn">${i+1}</div>
    <select id="ce-par-${i}">${[3,4,5,6].map(p=>`<option ${h.par===p?"selected":""}>${p}</option>`).join("")}</select>
    <input id="ce-si-${i}" type="number" inputmode="numeric" min="1" max="${n}" value="${Math.min(n,h.si||i+1)}" aria-label="SI"></div>`).join("");
  return `<h3>${cid?esc(t("edit")):esc(t("newCourse"))}</h3>
    <label>${esc(t("courseName"))}</label><input id="ce-name" value="${c?esc(c.name):""}" placeholder="Golfpark …">
    <label>${esc(t("holeCount"))}</label>
    <select id="ce-n" onchange="modal(courseForm(collectCourse('${cid}',false), parseInt(this.value,10)))">
      <option value="9" ${n===9?"selected":""}>9</option><option value="18" ${n===18?"selected":""}>18</option></select>
    <div class="hole-row" style="margin-top:12px"><div></div><label style="margin:0">${esc(t("par"))}</label><label style="margin:0">${esc(t("si"))}</label></div>
    ${rows}
    <button class="btn-ghost btn-block small" onclick="quickSi(${n})">${esc(t("quickSi"))}</button>
    <div id="ce-warn" class="muted small" style="color:var(--amber)"></div>
    <div class="util-grid" style="margin-top:10px"><button onclick="closeModal()">${esc(t("cancel"))}</button>
      <button class="btn-primary" onclick="saveCourse('${cid}')">${esc(t("save"))}</button></div>`;
}
function quickSi(n){ for(let i=0;i<n;i++){ const el=document.getElementById("ce-si-"+i); if(el) el.value=i+1; } }
function collectCourse(id, strict){
  const nEl=document.getElementById("ce-n");
  const n = nEl ? parseInt(nEl.value,10) : 18;
  const holes=[];
  for(let i=0;i<n;i++){
    const pe=document.getElementById("ce-par-"+i), se=document.getElementById("ce-si-"+i);
    holes.push({ par: pe?parseInt(pe.value,10):4, si: se?Math.max(1,Math.min(n,parseInt(se.value,10)||i+1)):i+1 });
  }
  return { id: id||null, name: (document.getElementById("ce-name")||{}).value||"", holes };
}
function saveCourse(id){
  const c = collectCourse(id, true);
  if(!c.name.trim()){ document.getElementById("ce-warn").textContent=t("nameMissing"); return; }
  const sis = c.holes.map(h=>h.si), n=c.holes.length;
  const unique = new Set(sis).size===n;
  if(!unique){
    const w=document.getElementById("ce-warn");
    if(w.dataset.warned!=="1"){ w.textContent = tf("siWarn",{n}); w.dataset.warned="1"; return; }
  }
  c.name=c.name.trim();
  const i = id ? S.courses.findIndex(x=>x.id===id) : -1;
  if(i>=0){ c.id=id; S.courses[i]=c; }
  else { c.id=uid(); S.courses.push(c); }
  save(); closeModal(); renderCourses();
}
function askDelCourse(id){
  modal(`<p>${esc(t("deleteCourseConfirm"))}</p><div class="util-grid">
    <button onclick="closeModal()">${esc(t("back"))}</button>
    <button class="btn-danger-soft" onclick="S.courses=S.courses.filter(x=>x.id!=='${id}');save();closeModal();renderCourses()">${esc(t("confirm"))}</button></div>`);
}
/* --- export / import --- */
function exportData(){
  const blob = new Blob([JSON.stringify(S,null,1)], {type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="stableford-caddy-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000);
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!d || !Array.isArray(d.courses) || !Array.isArray(d.rounds)) throw 0;
      modal(`<p>${esc(t("importConfirm"))}</p><div class="util-grid">
        <button onclick="closeModal()">${esc(t("back"))}</button>
        <button class="btn-primary" id="imp-go">${esc(t("confirm"))}</button></div>`);
      document.getElementById("imp-go").onclick=()=>{
        d.tab="courses"; S=d; save(); closeModal(); render();
        modal(`<p>${esc(t("importOk"))}</p><button class="btn-block" onclick="closeModal()">OK</button>`);
      };
    }catch(e){ modal(`<p>${esc(t("importErr"))}</p><button class="btn-block" onclick="closeModal()">OK</button>`); }
    inp.value="";
  };
  rd.readAsText(f);
}

/* ================= INIT ================= */
render();
if("serviceWorker" in navigator){ window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }
</script>
</body>
